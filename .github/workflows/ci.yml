name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-py${{ matrix.python-version }}

      - name: Install maturin + test dependencies
        run: pip install maturin pytest

      # pip install -e . invokes maturin as the PEP 517 build backend.
      # This works without a manually-activated virtualenv — pip manages the
      # environment itself and passes the correct interpreter to maturin.
      - name: Build and install extension
        run: pip install -e . --no-build-isolation
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # clippy compiles the pyo3 extension, which needs Python headers.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain with clippy + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
